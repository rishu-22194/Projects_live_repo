<!DOCTYPE html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tic Tac Toe</title>
        <script src="TicTacToe/ticTacToeJs.js" defer></script>
        <link rel="stylesheet" href="TicTacToe/ticTacToeCss.css">
    </head>

    <body>

        <div id="screenContainer">
            <div id="headerContainer">
                <div id="player1" class="textTitles">Player 1</div>
                <div id="vs" class="textTitles">V/S</div>
                <div id="player2" class="textTitles">Player 2</div>
            </div>
            <div id="gameContainer">
                <div id="gameArea">
                    <div id="block1" value="4" class="blocks"><p class="text"></p></div>
                    <div id="block2" value="9" class="blocks"><p class="text"></p></div>
                    <div id="block3" value="2" class="blocks"><p class="text"></p></div>
                    <div id="block4" value="3" class="blocks"><p class="text"></p></div>
                    <div id="block5" value="5" class="blocks"><p class="text"></p></div>
                    <div id="block6" value="7" class="blocks"><p class="text"></p></div>
                    <div id="block7" value="8" class="blocks"><p class="text"></p></div>
                    <div id="block8" value="1" class="blocks"><p class="text"></p></div>
                    <div id="block9" value="6" class="blocks"><p class="text"></p></div>
                </div>

                <div id="TgameArea">
                    <div id="Tblock1" class="Tblocks"></div>
                    <div id="Tblock2" class="Tblocks"></div>
                    <div id="Tblock3" class="Tblocks"></div>
                    <div id="Tblock4" class="Tblocks"></div>
                    <div id="Tblock5" class="Tblocks"></div>
                    <div id="Tblock6" class="Tblocks"></div>
                    <div id="Tblock7" class="Tblocks"></div>
                    <div id="Tblock8" class="Tblocks"></div>
                    <div id="Tblock9" class="Tblocks"></div>
            </div>
        </div>

        <div id="winCardContainer">
            <div id="winCard">
                <div id="winText">Player 1 Win</div>
                <div id="buttonContainer">
                    <button id="Restart" type="reset">Restart</button>
                </div>
            </div>
        </div>
    </body>
</html>
